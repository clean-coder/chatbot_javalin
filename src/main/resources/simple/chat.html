<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangChain4j Chatbot</title>
  <link rel="stylesheet" href="/chat.css">
</head>
<body>
  <h1>🤖 LangChain4j Chatbot Demo</h1>

  <!-- history is swapped here after each POST -->
  <div id="history-panel">{{HISTORY}}</div>

  <div id="input-bar">
    <form method="post" action="/chat" style="display:contents">
      <textarea
        name="prompt"
        placeholder="Type your message… (Enter to send, Shift+Enter for newline)"
        rows="2"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.closest('form').submit();}"
      ></textarea>
      <button class="btn" type="submit">Send</button>
    </form>

    <form method="post" action="/clear" style="display:contents">
      <button class="btn clear" type="submit">Clear</button>
    </form>
  </div>

  <script>
    const panel = document.getElementById('history-panel');
    panel.scrollTop = panel.scrollHeight;
  </script>
</body>
</html>
